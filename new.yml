<!-- index.html -->
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Professional Login Page</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="login-container">
        <div class="login-box">
            <h2>Welcome Back</h2>
            <p>Please login to your account</p>

            <form action="#" method="post">
                <div class="input-group">
                    <label for="email">Email</label>
                    <input type="email" id="email" name="email" placeholder="Enter your email" required>
                </div>

                <div class="input-group">
                    <label for="password">Password</label>
                    <input type="password" id="password" name="password" placeholder="Enter your password" required>
                </div>

                <button type="submit">Login</button>

                <div class="extras">
                    <a href="#">Forgot Password?</a>
                    <a href="#">Sign Up</a>
                </div>
            </form>
        </div>
    </div>
</body>
</html>























/* style.css */
* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
    font-family: Arial, sans-serif;
}

body {
    background: linear-gradient(to right, #4facfe, #00f2fe);
    height: 100vh;
    display: flex;
    justify-content: center;
    align-items: center;
}

.login-container {
    width: 100%;
    display: flex;
    justify-content: center;
    align-items: center;
}

.login-box {
    background: white;
    padding: 40px;
    width: 350px;
    border-radius: 12px;
    box-shadow: 0 4px 20px rgba(0, 0, 0, 0.2);
    text-align: center;
}

.login-box h2 {
    margin-bottom: 10px;
    color: #333;
}

.login-box p {
    margin-bottom: 20px;
    color: #777;
}

.input-group {
    text-align: left;
    margin-bottom: 15px;
}

.input-group label {
    display: block;
    margin-bottom: 5px;
    color: #333;
    font-weight: bold;
}

.input-group input {
    width: 100%;
    padding: 10px;
    border: 1px solid #ccc;
    border-radius: 8px;
    outline: none;
}

.input-group input:focus {
    border-color: #4facfe;
}

button {
    width: 100%;
    padding: 12px;
    background: #4facfe;
    color: white;
    border: none;
    border-radius: 8px;
    cursor: pointer;
    font-size: 16px;
    margin-top: 10px;
}

button:hover {
    background: #007bff;
}

.extras {
    display: flex;
    justify-content: space-between;
    margin-top: 15px;
}

.extras a {
    text-decoration: none;
    color: #4facfe;
    font-size: 14px;
}

.extras a:hover {
    text-decoration: underline;
}




























# .github/workflows/html-validation.yml
name: HTML & CSS Validation on PR

on:
  pull_request:
    branches:
      - main
      - master

jobs:
  validate-html-css:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Install HTMLHint and Stylelint
        run: |
          npm install -g htmlhint stylelint stylelint-config-standard

      - name: Validate HTML Files
        run: |
          echo "Checking HTML syntax..."
          htmlhint "**/*.html"

      - name: Validate CSS Files
        run: |
          echo "Checking CSS syntax..."
          stylelint "**/*.css"

      - name: Check Missing Closing Tags
        run: |
          echo "Scanning for possible HTML tag issues..."
          if grep -r "<div[^>]*$" . --include="*.html"; then
            echo "Potential unclosed div tag found!"
            exit 1
          fi

      - name: Success Message
        run: echo "HTML and CSS validation passed successfully!"
